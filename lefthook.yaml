pre-push:
  parallel: true
  jobs:
    - name: admin-reports
      root: "admin-reports/"
      glob: "*.go"
      group:
        piped: true
        jobs:
          - run: go mod tidy -diff
          - run: go vet ./...
          - run: go test -count=1 -timeout 5m ./...
          - run: golangci-lint run --fix --config=../.golangci.yml ./...
    - name: alerter
      root: "alerter/"
      glob: "*.go"
      group:
